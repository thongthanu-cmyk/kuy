<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>อเวคเคนนิ่ง: ร่างสถิตเทพ (Full-Body Aura & Infinite Range)</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Prompt:wght@500;700&display=swap');
    
    body { 
      display: flex; justify-content: center; align-items: center; height: 100vh; 
      background-color: #020202; margin: 0; overflow: hidden; font-family: 'Prompt', sans-serif;
    }
    #canvas_container { 
      position: relative; border-radius: 15px; overflow: hidden;
      box-shadow: 0 0 80px rgba(0, 0, 0, 1);
    }
    canvas { transform: scaleX(-1); border-radius: 15px; width: 800px; height: 600px; background-color: #000; }
    
    #ui_panel {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 20px; z-index: 10;
    }
    button {
      background: rgba(15, 15, 15, 0.8); color: #fff; border: 2px solid transparent;
      padding: 10px 25px; border-radius: 30px; font-size: 16px; font-weight: bold;
      cursor: pointer; transition: all 0.3s; backdrop-filter: blur(8px);
    }
    button:hover { transform: scale(1.05); }
    
    .btn-magic.active { border-color: #ff1177; box-shadow: 0 0 30px #ff1177; color: #ff99bb; }
    .btn-scifi.active { border-color: #00eeff; box-shadow: 0 0 30px #00eeff; color: #ccffff; font-family: 'Orbitron', sans-serif; }

    .shaking { animation: shake 0.1s infinite cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
      0% { transform: translate(0, 0) scaleX(-1); }
      25% { transform: translate(6px, 6px) scaleX(-1); }
      50% { transform: translate(-6px, -6px) scaleX(-1); }
      75% { transform: translate(6px, -6px) scaleX(-1); }
      100% { transform: translate(-6px, 6px) scaleX(-1); }
    }
  </style>
</head>
<body>

  <div id="canvas_container">
    <div id="ui_panel">
      <button id="btn_magic" class="btn-magic active">🔥 จอมมารยักษา</button>
      <button id="btn_scifi" class="btn-scifi">🌌 ไซบอร์กเทวะ</button>
    </div>
    <video class="input_video" style="display: none;"></video>
    <canvas class="output_canvas" width="800" height="600"></canvas>
  </div>

  <script>
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d', { alpha: false });
    
    let currentMode = 'MAGIC'; 
    document.getElementById('btn_magic').addEventListener('click', () => { currentMode = 'MAGIC'; document.getElementById('btn_magic').classList.add('active'); document.getElementById('btn_scifi').classList.remove('active'); });
    document.getElementById('btn_scifi').addEventListener('click', () => { currentMode = 'SCIFI'; document.getElementById('btn_scifi').classList.add('active'); document.getElementById('btn_magic').classList.remove('active'); });

    let time = 0;
    let particles = [];

    function getDistance(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }

    // ==========================================
    // 🌪️ เอฟเฟกต์ออร่ารอบตัว (Full-Body Aura)
    // ==========================================
    function drawBodyAura(pose, w, h) {
      if (!pose || !pose[11] || !pose[12] || !pose[23] || !pose[24]) return;

      // คำนวณจุดกึ่งกลางลำตัว
      const centerX = (pose[11].x + pose[12].x + pose[23].x + pose[24].x) / 4 * w;
      const centerY = (pose[11].y + pose[12].y + pose[23].y + pose[24].y) / 4 * h;
      const bodyWidth = Math.abs(pose[11].x - pose[12].x) * w * 2.5; // กว้างกว่าตัวจริง
      const bodyHeight = Math.abs(pose[11].y - pose[23].y) * h * 2.5;

      canvasCtx.save();
      canvasCtx.translate(centerX, centerY);

      if (currentMode === 'MAGIC') {
        // ออร่าพลังเวทย์พวยพุ่งขึ้นด้านบน
        for (let i = 0; i < 10; i++) {
          canvasCtx.beginPath();
          const angle = (time * 0.1) + (i * Math.PI / 5);
          const x = Math.cos(angle) * bodyWidth * 0.6;
          const y = Math.sin(angle) * bodyHeight * 0.5 + (Math.sin(time * 0.5 + i) * 30);
          
          canvasCtx.moveTo(x, y + bodyHeight*0.5); // เริ่มจากด้านล่าง
          // ลากเส้นโค้งพุ่งขึ้นไปข้างบนหัว
          canvasCtx.quadraticCurveTo(x * 1.5, -bodyHeight * 0.5, x * 0.2, -bodyHeight * 1.5);
          
          canvasCtx.strokeStyle = `rgba(255, 17, 119, ${0.6 - (Math.sin(time * 0.3)*0.2)})`;
          canvasCtx.lineWidth = 15 + Math.random() * 15;
          canvasCtx.shadowColor = '#ff1177'; canvasCtx.shadowBlur = 40;
          canvasCtx.stroke();
        }
      } else {
        // บาเรียหกเหลี่ยมและวงแหวนโฮโลแกรม
        canvasCtx.rotate(time * 0.02);
        
        // วงแหวนป้องกัน 3 ชั้น
        for(let j=1; j<=3; j++) {
            canvasCtx.beginPath();
            canvasCtx.arc(0, 0, bodyWidth * 0.4 * j, 0, Math.PI * 2);
            canvasCtx.strokeStyle = `rgba(0, 238, 255, ${0.4 / j})`;
            canvasCtx.lineWidth = 10 / j;
            canvasCtx.setLineDash(j%2===0 ? [20, 15] : [5, 20]);
            canvasCtx.stroke();
        }
        canvasCtx.setLineDash([]);

        // เกราะหกเหลี่ยม (Hexagon Shield)
        canvasCtx.rotate(-time * 0.04);
        canvasCtx.beginPath();
        for (let i = 0; i <= 6; i++) {
          const angle = i * Math.PI / 3;
          const x = Math.cos(angle) * bodyWidth * 0.8;
          const y = Math.sin(angle) * bodyWidth * 0.8;
          if (i === 0) canvasCtx.moveTo(x, y);
          else canvasCtx.lineTo(x, y);
        }
        canvasCtx.strokeStyle = 'rgba(0, 238, 255, 0.6)';
        canvasCtx.lineWidth = 6;
        canvasCtx.shadowColor = '#00eeff'; canvasCtx.shadowBlur = 30;
        canvasCtx.stroke();
      }
      canvasCtx.restore();
    }

    // ==========================================
    // ✨ เอฟเฟกต์อาวุธต่างๆ
    // ==========================================
    function drawComplexArray(size, isMagic) {
      canvasCtx.lineWidth = 2;
      canvasCtx.strokeStyle = isMagic ? 'rgba(255, 17, 119, 0.6)' : 'rgba(0, 238, 255, 0.6)';
      canvasCtx.beginPath(); canvasCtx.arc(0, 0, size * 1.5, 0, Math.PI * 2); canvasCtx.stroke();
      canvasCtx.beginPath(); canvasCtx.arc(0, 0, size * 1.6, 0, Math.PI * 2); canvasCtx.setLineDash([10, 15]); canvasCtx.stroke(); canvasCtx.setLineDash([]);

      if (isMagic) {
        for(let i = 0; i < 8; i++) {
          canvasCtx.rotate(Math.PI / 4);
          canvasCtx.beginPath(); canvasCtx.moveTo(0, size * 1.5); canvasCtx.lineTo(size * 0.4, size * 0.4); canvasCtx.stroke();
        }
      } else {
        for(let i = 0; i < 6; i++) {
          canvasCtx.rotate(Math.PI / 3);
          canvasCtx.strokeRect(-size*0.8, -size*0.8, size*1.6, size*1.6);
        }
      }
    }

    function drawEnergyVortex(x, y, size) {
      canvasCtx.save(); canvasCtx.translate(x, y);
      const isMagic = currentMode === 'MAGIC';
      const coreColor = isMagic ? '#ff1177' : '#00eeff';

      canvasCtx.save(); canvasCtx.rotate(time * 0.02); drawComplexArray(size, isMagic); canvasCtx.restore();
      canvasCtx.save(); canvasCtx.rotate(-time * 0.03); drawComplexArray(size * 0.7, isMagic); canvasCtx.restore();

      const grad = canvasCtx.createRadialGradient(0,0,0, 0,0,size * 1.2);
      grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.2, coreColor); grad.addColorStop(0.6, 'transparent');
      canvasCtx.fillStyle = grad; canvasCtx.beginPath(); canvasCtx.arc(0, 0, size * 1.2, 0, Math.PI*2); canvasCtx.fill();

      for(let j=0; j<5; j++) {
        canvasCtx.rotate(Math.PI * 2 / 5);
        canvasCtx.beginPath(); canvasCtx.moveTo(0, 0);
        let px = 0, py = 0;
        for(let k=0; k<6; k++) {
          px += (Math.random()*size*0.4 + 5); py += (Math.random()-0.5)*size*0.5;
          canvasCtx.lineTo(px, py);
        }
        canvasCtx.strokeStyle = '#ffffff'; canvasCtx.lineWidth = 3; canvasCtx.stroke();
      }
      canvasCtx.restore();
    }

    function drawEpicLightning(p1, p2, thicknessBase = 4) {
      const isMagic = currentMode === 'MAGIC';
      canvasCtx.save();
      const dist = getDistance(p1, p2);
      const dynamicThickness = thicknessBase + (dist / 80); // สายฟ้ายิ่งไกลยิ่งอลังการ

      for (let b = 0; b < 4; b++) {
        canvasCtx.beginPath(); canvasCtx.moveTo(p1.x, p1.y);
        const steps = 20;
        for (let i = 1; i < steps; i++) {
          const tx = p1.x + (p2.x - p1.x) * (i/steps); const ty = p1.y + (p2.y - p1.y) * (i/steps);
          const offset = (Math.random() - 0.5) * (dist * 0.15); 
          canvasCtx.lineTo(tx + offset, ty + offset);
        }
        canvasCtx.lineTo(p2.x, p2.y);
        canvasCtx.strokeStyle = b===0 ? '#ffffff' : (isMagic ? '#ff1177' : '#00eeff'); 
        canvasCtx.lineWidth = b===0 ? dynamicThickness * 0.5 : dynamicThickness;
        canvasCtx.shadowColor = isMagic ? '#ff1177' : '#00eeff'; canvasCtx.shadowBlur = 40; canvasCtx.stroke();
      }
      canvasCtx.restore();
    }

    function fireMouthBeam(x, y) {
      canvasElement.classList.add('shaking');
      canvasCtx.save();
      const isMagic = currentMode === 'MAGIC';
      const w = 180 + Math.sin(time*0.8)*40; // ลำแสงใหญ่ขึ้น
      
      const grad = canvasCtx.createLinearGradient(x - w/2, 0, x + w/2, 0);
      grad.addColorStop(0, 'transparent'); grad.addColorStop(0.2, isMagic ? '#aa0055' : '#0077ff'); 
      grad.addColorStop(0.5, '#ffffff'); grad.addColorStop(0.8, isMagic ? '#aa0055' : '#0077ff'); grad.addColorStop(1, 'transparent');
      
      canvasCtx.fillStyle = grad; canvasCtx.shadowColor = isMagic ? '#ff1177' : '#00eeff'; canvasCtx.shadowBlur = 100;
      canvasCtx.fillRect(x - w/2, 0, w, y);

      canvasCtx.beginPath();
      for(let i = 0; i < y; i+=10) {
        const spiralX = x + Math.sin(i * 0.05 + time * 0.3) * (w * 0.7);
        if(i===0) canvasCtx.moveTo(spiralX, y - i); else canvasCtx.lineTo(spiralX, y - i);
      }
      canvasCtx.strokeStyle = '#ffffff'; canvasCtx.lineWidth = 6; canvasCtx.stroke();
      
      canvasCtx.beginPath(); canvasCtx.arc(x, y, 100, 0, Math.PI*2);
      canvasCtx.fillStyle = isMagic ? 'rgba(255, 17, 119, 0.9)' : 'rgba(0, 238, 255, 0.9)'; canvasCtx.fill();
      canvasCtx.restore();
    }

    // ==========================================
    // 🧠 เอนจิ้นประมวลผลหลัก
    // ==========================================
    function isIndexFingerUp(lm) { return lm[8].y < lm[6].y && lm[12].y > lm[10].y && lm[16].y > lm[14].y && lm[20].y > lm[18].y; }

    function onResults(results) {
      time++; 
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.globalCompositeOperation = 'screen'; 
      
      const w = canvasElement.width; const h = canvasElement.height;
      
      // ตัวแปรเก็บสถานะว่ากำลังใช้พลังอยู่หรือไม่
      let isActionActive = false; 
      let activeActionType = null; // 'MOUTH', 'LASER', 'VORTEX'

      // ตรวจสอบเงื่อนไขการใช้พลังทั้งหมดก่อนวาด
      // 1. ตรวจปาก
      let mouthCenter = null;
      if (results.faceLandmarks) {
        const upperLip = { x: results.faceLandmarks[13].x * w, y: results.faceLandmarks[13].y * h };
        const lowerLip = { x: results.faceLandmarks[14].x * w, y: results.faceLandmarks[14].y * h };
        if (getDistance(upperLip, lowerLip) > 30) {
          isActionActive = true; activeActionType = 'MOUTH';
          mouthCenter = {x: (upperLip.x+lowerLip.x)/2, y: (upperLip.y+lowerLip.y)/2};
        }
      }

      // 2. ตรวจมือ
      let lTip = null, rTip = null, lPalm = null, rPalm = null;
      let lHand = results.leftHandLandmarks, rHand = results.rightHandLandmarks;
      if (lHand) { lTip = {x: lHand[8].x*w, y: lHand[8].y*h}; lPalm = {x: lHand[9].x*w, y: lHand[9].y*h}; }
      if (rHand) { rTip = {x: rHand[8].x*w, y: rHand[8].y*h}; rPalm = {x: rHand[9].x*w, y: rHand[9].y*h}; }

      let lUp = lHand && isIndexFingerUp(lHand); let rUp = rHand && isIndexFingerUp(rHand);

      if (lUp && rUp) {
        const dist = getDistance(lTip, rTip);
        if (dist < 2000) { // ระยะอนันต์ (กว้างกว่าขอบจอ)
          isActionActive = true; if(!activeActionType) activeActionType = 'LASER';
        }
      } else if (lHand && rHand && !lUp && !rUp) {
        const dist = getDistance(lPalm, rPalm);
        if (dist > 50 && dist < 1200) { // ระยะชาร์จบอลกว้างมาก
          isActionActive = true; if(!activeActionType) activeActionType = 'VORTEX';
        }
      }

      // --- วาดลำดับที่ 1: ออร่าคลุมร่าง (ถ้ามีการใช้พลัง) ---
      if (isActionActive && results.poseLandmarks) {
        drawBodyAura(results.poseLandmarks, w, h);
      }

      // --- วาดลำดับที่ 2: ดวงตา ---
      if (results.faceLandmarks) {
        const face = results.faceLandmarks;
        const leftEye = { x: face[159].x * w, y: face[159].y * h }; const rightEye = { x: face[386].x * w, y: face[386].y * h }; 
        const drawEyeGlow = (pos) => {
          const grad = canvasCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, 45);
          grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.2, currentMode==='MAGIC'?'#ff1177':'#00eeff'); grad.addColorStop(1, 'transparent');
          canvasCtx.fillStyle = grad; canvasCtx.beginPath(); canvasCtx.arc(pos.x, pos.y, 45, 0, Math.PI*2); canvasCtx.fill();
        };
        drawEyeGlow(leftEye); drawEyeGlow(rightEye);
      }

      // --- วาดลำดับที่ 3: ปล่อยพลังอาวุธ ---
      if (activeActionType === 'MOUTH' && mouthCenter) {
        fireMouthBeam(mouthCenter.x, mouthCenter.y);
      } 
      else if (activeActionType === 'LASER') {
        canvasElement.classList.add('shaking');
        drawEpicLightning(lTip, rTip, 8); // เส้นหนาขึ้น
      } 
      else if (activeActionType === 'VORTEX') {
        const dist = getDistance(lPalm, rPalm);
        const midX = (lPalm.x + rPalm.x)/2; const midY = (lPalm.y + rPalm.y)/2;
        const vortexSize = Math.max(50, 200 - (dist * 0.15)); // ลูกใหญ่ขึ้น
        drawEnergyVortex(midX, midY, vortexSize);
        drawEpicLightning(lPalm, {x: midX, y: midY}, 4);
        drawEpicLightning(rPalm, {x: midX, y: midY}, 4);
      }

      if (activeActionType !== 'MOUTH' && activeActionType !== 'LASER') {
        canvasElement.classList.remove('shaking');
      }

      canvasCtx.restore();
    }

    const holistic = new Holistic({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}`});
    holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    holistic.onResults(onResults);

    const camera = new Camera(videoElement, { onFrame: async () => { await holistic.send({image: videoElement}); }, width: 800, height: 600 });
    camera.start();
  </script>

</body>
</html>
